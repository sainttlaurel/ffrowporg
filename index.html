<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to Google Fonts CDN for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- Primary meta -->
    <title>Dragons Project Free Webinar — Reserve Your Seat Today</title>
    <meta
      name="description"
      content="Join Sir Mark Anthony Cruz for a free online webinar and discover how ordinary people are building extraordinary results with the Dragons Project. Open to all countries. 18+ only. Limited seats — register now."
    />
    <!-- noindex removed — page is now public and indexable -->

    <!-- Open Graph (Facebook, Messenger, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dragons Project Free Webinar — Reserve Your Seat Today" />
    <meta
      property="og:description"
      content="Join Sir Mark Anthony Cruz for a free online webinar and discover how ordinary people are building extraordinary results with the Dragons Project. Open to all countries. 18+ only. Limited seats — register now."
    />
    <!-- TODO: replace with a real 1200×630 cover image once available -->
    <meta property="og:image" content="https://ffrowporg.vercel.app/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://ffrowporg.vercel.app" />
    <meta property="og:site_name" content="Dragons Project Webinar" />
    <meta property="og:locale" content="en_PH" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dragons Project Free Webinar — Reserve Your Seat Today" />
    <meta
      name="twitter:description"
      content="Join Sir Mark Anthony Cruz for a free online webinar and discover how ordinary people are building extraordinary results with the Dragons Project. Open to all countries. 18+ only."
    />
    <meta name="twitter:image" content="https://ffrowporg.vercel.app/logo.png" />

    <!-- Theme colour (browser chrome on mobile) -->
    <meta name="theme-color" content="#080808" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- JSON-LD structured data — Event schema for Google Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Event",
      "name": "Dragons Project Free Online Webinar",
      "description": "Join Sir Mark Anthony Cruz for a free online webinar open to all countries. Discover how ordinary people are building extraordinary results with the Dragons Project. 18 years old and above only. Limited seats available.",
      "eventStatus": "https://schema.org/EventScheduled",
      "eventAttendanceMode": "https://schema.org/OnlineEventAttendanceMode",
      "location": {
        "@type": "VirtualLocation",
        "url": "https://ffrowporg.vercel.app"
      },
      "image": "https://ffrowporg.vercel.app/logo.png",
      "organizer": {
        "@type": "Person",
        "name": "Sir Mark Anthony Cruz",
        "description": "Speaker, Dragons Project Free Online Webinar"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "PHP",
        "availability": "https://schema.org/LimitedAvailability",
        "url": "https://ffrowporg.vercel.app"
      }
    }
    </script>

    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
